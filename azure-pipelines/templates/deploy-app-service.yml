# Azure DevOps CI/CD pipeline template for VoyageVoyage.
#
# CI stage:
# - runs on all branches
# - builds Angular front end
# - publishes ASP.NET server (including front build copied to wwwroot)
# - archives and publishes a deployment artifact
#
# CD stage:
# - runs only when source branch is main
# - deploys the artifact to Azure App Service
#
# Required pipeline variables (set in the consuming pipeline or variable group):
# - azureSubscription: Azure DevOps service connection name
# - appName: Azure App Service name
#
# Usage example (root azure-pipelines.yml):
# trigger:
#   branches:
#     include:
#       - '*'
# pr:
#   branches:
#     include:
#       - '*'
# stages:
#   - template: azure-pipelines/templates/deploy-app-service.yml
#     parameters:
#       artifactName: drop
#       packageFileName: voyagevoyage-app.zip
#       environmentName: production

parameters:
  - name: artifactName
    type: string
    default: drop
  - name: packageFileName
    type: string
    default: voyagevoyage-app.zip
  - name: environmentName
    type: string
    default: production

stages:
  - stage: CI
    displayName: Build and package
    jobs:
      - job: BuildAndPackage
        displayName: Build front and server
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: Use Node.js 20
            inputs:
              versionSpec: 20.x

          - script: |
              cd front
              npm ci
              npm run build
            displayName: Build Angular front end

          - task: UseDotNet@2
            displayName: Use .NET SDK 10.x
            inputs:
              packageType: sdk
              version: 10.0.x

          - script: |
              cd server/VoyageVoyage.Server
              dotnet restore
              dotnet publish -c Release -o "$(Build.ArtifactStagingDirectory)/app"
            displayName: Publish ASP.NET server

          - script: |
              mkdir -p "$(Build.ArtifactStagingDirectory)/app/wwwroot"
              cp -R "$(Build.SourcesDirectory)/front/dist/voyagevoyage-front/browser/." "$(Build.ArtifactStagingDirectory)/app/wwwroot/"
            displayName: Ensure Angular build is present in published wwwroot

          - task: ArchiveFiles@2
            displayName: Archive deploy package
            inputs:
              rootFolderOrFile: $(Build.ArtifactStagingDirectory)/app
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/${{ parameters.packageFileName }}
              replaceExistingArchive: true

          - task: PublishPipelineArtifact@1
            displayName: Publish deployment artifact
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/${{ parameters.packageFileName }}
              artifact: ${{ parameters.artifactName }}

  - stage: CD
    displayName: Deploy to Azure App Service
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployToAzureAppService
        displayName: Deploy package
        environment: ${{ parameters.environmentName }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none

                - task: DownloadPipelineArtifact@2
                  displayName: Download build artifact
                  inputs:
                    artifact: ${{ parameters.artifactName }}
                    path: $(Pipeline.Workspace)/${{ parameters.artifactName }}

                - task: AzureWebApp@1
                  displayName: Deploy package to App Service
                  inputs:
                    azureSubscription: $(azureSubscription)
                    appType: webApp
                    appName: $(appName)
                    package: $(Pipeline.Workspace)/${{ parameters.artifactName }}/${{ parameters.packageFileName }}
