trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  # Required: Azure DevOps Library variable group containing:
  # - azureServiceConnection
  # - appServiceName
  - group: 'voyagevoyage-deployment'
  - name: buildConfiguration
    value: 'Release'
  - name: vmImage
    value: 'ubuntu-latest'
  - name: serverProject
    value: 'server/VoyageVoyage.Server/VoyageVoyage.Server.csproj'
  - name: serverWwwroot
    value: 'server/VoyageVoyage.Server/wwwroot'
  - name: frontBuildOutput
    value: 'front/dist/voyagevoyage-front/browser'
  - name: artifactName
    value: 'VoyageVoyage.Server.zip'
  - name: appServiceType
    # Valid appType values include: webApp, webAppLinux, webAppContainer.
    value: 'webAppLinux'

stages:
  - stage: CI
    displayName: Build and package
    jobs:
      - job: BuildAndPackage
        displayName: Build front and server
        pool:
          vmImage: $(vmImage)
        steps:
          - task: UseNode@1
            inputs:
              version: '24.x'
            displayName: Use Node.js 24
            
          - script: |
              npm ci --legacy-peer-deps
              npm run build
            displayName: Build Angular app
            workingDirectory: front

          - script: |
              # Enable strict error handling and command echo for easier CI troubleshooting.
              set -eux
              FRONT_INDEX_PATH="$(frontBuildOutput)/index.html"
              if [ ! -f "$FRONT_INDEX_PATH" ]; then
                echo "Expected Angular build output at $FRONT_INDEX_PATH was not found."
                exit 1
              fi
              rm -rf "$(serverWwwroot)"
              mkdir -p "$(serverWwwroot)"
              cp -R "$(frontBuildOutput)/." "$(serverWwwroot)/"
            displayName: Copy Angular production files to server wwwroot

          - task: UseDotNet@2
            displayName: Use .NET SDK 10.x
            inputs:
              packageType: 'sdk'
              version: '10.x'
          - task: DotNetCoreCLI@2
            inputs:
              command: 'build'
              projects: '$(serverProject)'
              arguments: '--configuration $(buildConfiguration) -r $(buildPlatform) --no-self-contained'
          - task: DotNetCoreCLI@2
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: '$(serverProject)'
              nobuild: true
              arguments: '--no-build --configuration $(buildConfiguration) -r $(buildPlatform) --no-self-contained -o "$(Build.ArtifactStagingDirectory)/publish"'
          
          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/publish/$(artifactName)'
              publishLocation: 'pipeline'
              artifact: 'server'

  - stage: CD
    displayName: Deploy to Azure App Service
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployWebApp
        displayName: Deploy web app
        environment: production
        pool:
          vmImage: $(vmImage)
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureRmWebAppDeployment@4
                  displayName: Deploy to Azure App Service
                  inputs:
                    ConnectionType: 'AzureRM'
                    azureSubscription: '$(azureServiceConnection)'
                    appType: '$(appServiceType)'
                    WebAppName: '$(appServiceName)'
                    packageForLinux: '$(Pipeline.Workspace)/server/*.zip'
