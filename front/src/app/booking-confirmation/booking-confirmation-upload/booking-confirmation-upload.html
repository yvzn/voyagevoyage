<div>
  <label
    class="inline-flex cursor-pointer items-center gap-2 rounded-lg bg-blue-600 px-3 py-1.5 text-sm font-medium text-white hover:bg-blue-700 focus-within:ring-2 focus-within:ring-blue-300 dark:bg-blue-500 dark:hover:bg-blue-600"
    [class.opacity-50]="isParsing()"
    [class.pointer-events-none]="isParsing()"
  >
    @if (isParsing()) {
      <svg class="h-4 w-4 animate-spin" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.568 3 7.036l3-2.745z"/>
      </svg>
      {{ 'bookingConfirmation.parsing' | translate }}
    } @else {
      <svg class="h-4 w-4" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
      </svg>
      {{ 'bookingConfirmation.uploadButton' | translate }}
    }
    <input
      type="file"
      class="sr-only"
      accept=".ics,.pdf"
      [disabled]="isParsing()"
      (change)="onFileSelected($event)"
      aria-label="{{ 'bookingConfirmation.uploadButton' | translate }}"
    />
  </label>

  @if (parseError()) {
    <p role="alert" class="mt-2 text-sm text-red-600 dark:text-red-400">
      {{ parseError()! | translate }}
    </p>
  }
</div>
