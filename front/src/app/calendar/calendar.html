<section aria-labelledby="calendar-heading">
  <h2 id="calendar-heading" class="sr-only">{{ 'calendarHeading' | translate }}</h2>

  <!-- Calendar navigation -->
  <nav [attr.aria-label]="'calendarNavLabel' | translate" class="mb-4">
    <div class="flex flex-wrap items-center justify-between gap-3 rounded-lg bg-white p-4 shadow-sm dark:bg-gray-800">
      <!-- Previous / Next month buttons + loading indicator -->
      <div class="flex items-center gap-1">
        <button
          type="button"
          (click)="goToPreviousMonth()"
          class="inline-flex items-center justify-center rounded-lg p-2.5 text-gray-500 hover:bg-gray-100 hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-300 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white"
          [attr.aria-label]="'previousMonthLabel' | translate"
        >
          <svg class="h-5 w-5" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
          </svg>
        </button>

        <button
          type="button"
          (click)="goToNextMonth()"
          class="inline-flex items-center justify-center rounded-lg p-2.5 text-gray-500 hover:bg-gray-100 hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-300 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white"
          [attr.aria-label]="'nextMonthLabel' | translate"
        >
          <svg class="h-5 w-5" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
          </svg>
        </button>

        <!-- Loading / error indicator — inline, non-blocking, fixed width to prevent horizontal CLS -->
        <div class="ml-1 min-w-[6rem]" aria-live="polite" aria-atomic="true">
          @if (tripsLoadStatus() === 'loading') {
            <div class="flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400" role="status">
              <svg class="h-4 w-4 animate-spin flex-shrink-0" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.568 3 7.036l3-2.745z"/>
              </svg>
              <span class="sr-only">{{ 'calendarLoading' | translate }}</span>
            </div>
          }
          @if (tripsLoadStatus() === 'failure') {
            <div class="flex items-center" role="alert">
              <button
                type="button"
                (click)="retryLoadTrips()"
                class="rounded-lg border border-red-300 px-2 py-1 text-xs font-medium text-red-700 hover:bg-red-50 focus:outline-none focus:ring-2 focus:ring-red-300 dark:border-red-600 dark:text-red-400 dark:hover:bg-red-900/20"
              >
                {{ 'calendarRetryButton' | translate }}
              </button>
            </div>
          }
        </div>
      </div>

      <!-- Month and year selectors -->
      <div class="flex items-center gap-2">
        <div>
          <label for="month-select" class="sr-only">{{ 'monthSelectLabel' | translate }}</label>
          <select
            id="month-select"
            [value]="currentMonth()"
            (change)="onMonthChange($event)"
            class="block rounded-lg border border-gray-300 bg-gray-50 py-2 pl-3 pr-8 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:focus:border-blue-500 dark:focus:ring-blue-500"
          >
            @for (name of monthNames(); track $index) {
              <option [value]="$index" [selected]="$index === currentMonth()">{{ name }}</option>
            }
          </select>
        </div>

        <div>
          <label for="year-input" class="sr-only">{{ 'yearInputLabel' | translate }}</label>
          <input
            #yearInput
            id="year-input"
            type="number"
            [value]="currentYear()"
            [min]="minYear"
            [max]="maxYear"
            (focus)="yearInput.select()"
            (change)="onYearChange($event)"
            class="block w-20 rounded-lg border border-gray-300 bg-gray-50 px-3 py-2 text-sm text-gray-900 focus:border-blue-500 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:focus:border-blue-500 dark:focus:ring-blue-500"
          />
        </div>
      </div>

      <!-- Today button and New trip button -->
      <div class="flex items-center gap-2">
        <button
          type="button"
          (click)="goToToday()"
          class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-900 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-300 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:hover:bg-gray-700"
        >
          {{ 'todayButton' | translate }}
        </button>

        <button
          type="button"
          (click)="openCreateForm()"
          class="inline-flex items-center gap-1.5 rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-300 dark:bg-blue-500 dark:hover:bg-blue-600"
        >
          <svg class="h-4 w-4" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          {{ 'newTripButton' | translate }}
        </button>
      </div>
    </div>
  </nav>

  <!-- Calendar grid -->
  <div class="overflow-x-auto rounded-lg bg-white shadow-sm dark:bg-gray-800" role="grid" aria-labelledby="calendar-heading">
    <app-calendar-grid
      [weeks]="weeks()"
      [trips]="trips()"
      [constraintsPerDay]="constraintsPerDay()"
      [allowedDaysOfWeek]="allowedDaysOfWeek()"
      [dayNames]="dayOfWeekNames()"
      [displayMonth]="displayMonth()"
      [displayYear]="displayYear()"
      (tripClicked)="navigateToTrip($event)"
      (addTripClicked)="openCreateForm($event)"
    />
  </div>

  <!-- Status legend -->
  <div class="mt-4 flex flex-wrap gap-4 rounded-lg bg-white px-4 py-3 shadow-sm dark:bg-gray-800" role="note" [attr.aria-label]="'tripStatusLegendLabel' | translate">
    @for (status of tripStatuses; track status) {
      <div class="flex items-center gap-1.5">
        <span
          class="h-3 w-3 flex-shrink-0 rounded"
          [ngClass]="getTripStatusDotClass(status)"
          aria-hidden="true"
        ></span>
        <span class="text-xs text-gray-600 dark:text-gray-300">{{ getTripStatusTranslationKey(status) | translate }}</span>
      </div>
    }
  </div>
</section>

<!-- Trip form modal -->
@if (isFormOpen()) {
  <app-trip-form
    [trip]="editingTrip()"
    [defaultDate]="formDefaultDate()"
    (saved)="closeForm()"
    (cancelled)="closeForm()"
  />
}
